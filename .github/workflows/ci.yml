name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - refs/tags/*
    tags:
      - '*'

env:
  CI: true
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  pii-log-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install Semgrep
        run: python -m pip install semgrep==1.136.0
      - name: Test PII logging rules
        run: semgrep test .semgrep
      - name: Scan changed application code for PII logging
        env:
          SEMGREP_BASELINE_COMMIT: ${{ github.event.pull_request.base.sha }}
        run: |
          semgrep scan --strict --metrics=off --no-rewrite-rule-ids \
            --config .semgrep/logging-pii.yml \
            --exclude src/main/assets/js/mojAll.js \
            --json-output semgrep-results.json \
            src/main
          python .semgrep/annotate.py semgrep-results.json

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install
        run: yarn install
      - name: Build
        run: yarn build
      - name: Pull WireMock mappings
        run: yarn wiremock:pull
